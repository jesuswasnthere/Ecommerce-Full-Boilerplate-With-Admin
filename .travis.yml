sudo: false
language: node_js
node_js:
- '18'
services: mongodb
branches:
  only:
  - master
cache:
  directories:
  - $HOME/.local/share/pnpm/store
before_install:
- corepack enable
- corepack prepare pnpm@10.15.1 --activate
install:
- pnpm install --frozen-lockfile
script:
- pnpm run test:ci
- pnpm run coveralls
